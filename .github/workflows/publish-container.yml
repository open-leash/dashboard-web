name: Publish container

on:
  workflow_dispatch:
    inputs:
      version:
        description: Immutable version tag to publish
        required: true
        default: 0.36.4
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Validate immutable semantic version
        shell: bash
        run: |
          version="${{ steps.version.outputs.value }}"
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]] || {
            echo "Expected a semantic version, got: $version" >&2
            exit 1
          }
          image="ghcr.io/open-leash/dashboard-web:$version"
          if docker buildx imagetools inspect "$image" >/dev/null 2>&1; then
            echo "Release tag already exists and is immutable: $image" >&2
            exit 1
          fi
      - name: Build scan candidate
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: openleash/dashboard-web:scan
      - name: Scan release image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: openleash/dashboard-web:scan
          scanners: vuln
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: "1"
      - name: Publish multi-architecture image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: ghcr.io/open-leash/dashboard-web:${{ steps.version.outputs.value }}
