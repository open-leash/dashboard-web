name: Publish container

on:
  workflow_dispatch:
    inputs:
      version:
        description: Immutable version tag to publish
        required: true
        default: 0.36.4
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  validate:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: docker/setup-buildx-action@v3
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Validate immutable semantic version
        shell: bash
        run: |
          version="${{ steps.version.outputs.value }}"
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]] || {
            echo "Expected a semantic version, got: $version" >&2
            exit 1
          }
          image="ghcr.io/open-leash/dashboard-web:$version"
          if docker buildx imagetools inspect "$image" >/dev/null 2>&1; then
            echo "Release tag already exists and is immutable: $image" >&2
            exit 1
          fi

  publish-platform:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: mnns
          # The package predates this repository and cannot inherit its
          # GITHUB_TOKEN permissions. Keep a write:packages PAT scoped as a
          # repository secret until GitHub supports linking it by API.
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Build scan candidate
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          platforms: ${{ matrix.platform }}
          tags: openleash/dashboard-web:scan-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=dashboard-web-${{ matrix.arch }}
      - name: Scan release image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: openleash/dashboard-web:scan-${{ matrix.arch }}
          scanners: vuln
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: "1"
      - name: Publish architecture image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=dashboard-web-${{ matrix.arch }}
          tags: ghcr.io/open-leash/dashboard-web:${{ needs.validate.outputs.version }}-${{ matrix.arch }}

  publish-manifest:
    needs:
      - validate
      - publish-platform
    runs-on: ubuntu-24.04
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: mnns
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Publish immutable multi-architecture manifest
        shell: bash
        run: |
          image="ghcr.io/open-leash/dashboard-web"
          version="${{ needs.validate.outputs.version }}"
          docker buildx imagetools create \
            --tag "$image:$version" \
            "$image:$version-amd64" \
            "$image:$version-arm64"
          docker buildx imagetools inspect "$image:$version"
